<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="formbox">
            <form action="" method="post">
                <h1>Login</h1>
                <div class="box">
                    <input type="text" placeholder="Username" required>
                </div>
                <div class="box">
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" id="button1">Login</button>
                <div class="remember-forgot">
                    <label for="remember">
                        <input type="checkbox" name="remember_me" id="remember"> Remember me</label>
                    <a href="forgotpassword.html">forgot_password?</a>
                </div>
            </form>
        </div>
        <div class="back">
            <h1>Hello! please login to continue.</h1>
            <a href="index.html" id="button2">Back</a>
        </div>
    </div>
    
</body>
</html>
