<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Student E-Voting System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;

        header {
            background-color:rgb(62, 110, 62);

            font-size: 20px;

        }

        .btn:hover {

  .logo {

    height: 98px;

  header {

.evoting {
  color: rgb(218, 171, 85);
}

}
</style>
</style>

</head>
